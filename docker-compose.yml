services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: photodelivery
      POSTGRES_USER: photodelivery
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photodelivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://photodelivery:${DB_PASSWORD:-change-me-in-production}@db:5432/photodelivery
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      EVENT_TOKEN_EXPIRE_MINUTES: "720"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      WATCH_FOLDER: /app/uploads/_incoming
      UPLOAD_FOLDER: /app/uploads
      BASE_URL: http://${SERVER_IP}
      API_PREFIX: /api/v1
      CORS_ORIGINS: http://${SERVER_IP}
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  uploads:
